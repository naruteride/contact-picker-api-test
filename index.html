<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>연락처 선택 API 테스트</title>
	<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
	<script>eruda.init();</script>
</head>

<body>
	<p id="supported"></p>
	<button id="pickContact">연락처 선택</button>
	<pre id="output"></pre>

	<script>
		const pickContactBtn = document.getElementById("pickContact");
		const output = document.getElementById("output");

		pickContactBtn.addEventListener("click", async () => {
			// 1. API 지원 여부 확인
			if (!("contacts" in navigator)) {
				output.textContent = "이 브라우저는 Contact Picker API를 지원하지 않습니다.";
				return;
			}

			try {
				// 2. 기기가 지원하는 속성만 필터링해서 요청
				const supported = await navigator.contacts.getProperties();
				const desired = ["name", "email", "tel"];
				const properties = desired.filter(p => supported.includes(p));

				if (properties.length === 0) {
					output.textContent = "지원되는 연락처 속성이 없습니다.";
					return;
				}

				// 3. 지원 속성으로만 선택 요청
				const contacts = await navigator.contacts.select(properties, { multiple: true });
				output.textContent = JSON.stringify(contacts, null, 2);
			} catch (err) {
				output.textContent = `오류: [${err.name}] ${err.message}`;
				console.error(err);
			}
		});
	</script>
</body>

</html>
