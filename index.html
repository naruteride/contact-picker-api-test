<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>연락처 선택 API 테스트</title>
	<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
	<script>eruda.init();</script>
</head>

<body>
	
	<h3>입력창 방식</h3>
	<p>입력창을 터치하면 스마트폰 자체의 연락처 자동완성이 뜹니다.</p>
	<input type="text" autocomplete="name" placeholder="이름 (터치하세요)">
	<input type="tel" autocomplete="tel" placeholder="연락처">
	
	<hr>
	
	<h3>버튼 방식</h3>
	<p id="supported"></p>
	<button id="pick-contact">연락처 선택</button>
	<pre id="output"></pre>

	<script>
		const supported = "contacts" in navigator;
		document.querySelector("#supported").textContent = "이 기기에서 연락처 선택이 " + (supported ? "지원됨" : "지원되지 않음");

		document.querySelector("#pick-contact").addEventListener("click", async () => {
			try {
				const contact = await navigator.contacts.select(["name", "tel"]);
				document.querySelector("#output").textContent = JSON.stringify(contact, null, 2);
			} catch (err) {
				document.querySelector("#output").textContent = "취소되었거나 지원하지 않는 기기입니다.";
			}
		});
	</script>
</body>

</html>
