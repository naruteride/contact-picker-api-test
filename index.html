<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>연락처 선택 API 테스트</title>
	<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
	<script>eruda.init();</script>
</head>

<body>
	<p id="supported"></p>
	<button id="pickContact">연락처 선택</button>

	<script>
		const pickContactBtn = document.getElementById("pickContact");
		const supported = "contacts" in navigator;
		document.getElementById("supported").textContent = "이 기기에서 연락처 선택이 " + (supported ? "지원됨" : "지원되지 않음");

		pickContactBtn.addEventListener("click", async () => {
			try {
				const contact = await navigator.contacts.select(
					["name", "tel"],
					{ multiple: true }
				);
				console.log(contact);
			} catch (err) {
				console.error(err);
			}
		});
	</script>
</body>

</html>
